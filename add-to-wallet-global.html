<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add NXC to Wallet - Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Translate Script -->
    <script>
        function googleTranslateElementInit(){
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                includedLanguages: 'en,zh-TW,zh-CN,ja,ko,fr,de,es,pt,ru,ar,id,vi,th,it,tr,hi', 
                autoDisplay: false, 
                multilanguagePage: true 
            }, 'google_translate_element'); 
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer></script>
    
    <style>
        :root {
            --bg-dark: #03010a;
            --text-main: #ffffff;
            --primary: #a370ff;
            --secondary: #00ffcc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body {
            margin: 0;
            background: radial-gradient(circle at center, #110526 0%, #03010a 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            text-align: center;
            padding-top: 100px;
            padding-bottom: 50px;
            /* 強制覆蓋 Google 翻譯引致的 top 移位設定 */
            top: 0 !important;
            position: static !important;
            margin-top: 0 !important;
        }

        /* 徹底隱藏 Google 翻譯頂部預留的空白橫條 */
        .goog-te-banner-frame.skiptranslate, .goog-te-banner-frame {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
        }
        body > .skiptranslate {
            display: none !important;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            background: rgba(7, 2, 20, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            box-sizing: border-box;
            z-index: 1000;
        }

        .nav-logo {
            height: 32px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 翻譯選單藥丸樣式 */
        #google_translate_element {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        #google_translate_element .goog-te-gadget {
            font-size: 12px !important;
            color: #fff !important;
        }

        #google_translate_element .goog-te-gadget span {
            display: none !important;
        }

        #google_translate_element select {
            background: transparent !important;
            color: #fff !important;
            border: none !important;
            font-size: 12px !important;
            padding: 4px 6px !important;
            outline: none !important;
            cursor: pointer;
        }

        .btn-connect {
            padding: 8px 18px;
            border-radius: 999px;
            background: transparent;
            color: var(--secondary);
            border: 1px solid rgba(0, 255, 204, 0.3);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-connect:hover {
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
        }

        .title-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .title-logo {
            width: 45px;
            height: 45px;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            background: linear-gradient(120deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 動態極光按鈕 */
        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid rgba(163, 112, 255, 0.5);
            background: linear-gradient(120deg, #a370ff 0%, #00ffcc 50%, #a370ff 100%);
            background-size: 200% auto;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            animation: btnShimmer 3s linear infinite;
            transition: transform 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        @keyframes btnShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .panel {
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .mrow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            gap: 10px;
        }

        .mrow:last-child {
            border-bottom: none;
        }

        /* 解決手機版地址爆開的關鍵 CSS 修正 */
        #addr {
            font-family: monospace; 
            font-size: 13px;
            word-break: break-all; /* 允許長地址自動安全換行 */
            text-align: right;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            flex-shrink: 0; /* 防止 Copy 按鈕被擠壓變形 */
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(0, 255, 204, 0.2);
        }

        .copyright {
            font-size: 12px;
            color: #888888;
        }

        .copyright a, .copyright a:visited {
            font-size: 12px;
            color: #888888;
            text-decoration: none;
        }

        .copyright a:hover {
            text-decoration: underline;
        }

        /* 手機 RWD 適配 */
        @media (max-width: 600px) {
            header { padding: 0 15px; }
            .container { padding: 30px 20px; margin: 0 15px; }
            #addr { font-size: 11px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index-global.html"><img class="nav-logo" src="XNXC.png" alt="NeoX Logo"></a>
        <div class="header-right">
            <!-- Google 翻譯選單位置 -->
            <div id="google_translate_element"></div>
            <button class="btn-connect" id="connect-btn">Connect Wallet</button>
        </div>
    </header>

    <div class="container">
        <div class="title-box">
            <img src="XNXC.png" class="title-logo" alt="NXC Logo">
            <h1>Add NXC Token</h1>
        </div>
        
        <button class="btn-main" id="add-token-btn">Add NXC to MetaMask</button>
        
        <p style="font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 20px;">
            MetaMask supports auto-add. For other wallets, use the details below:
        </p>

        <div class="panel">
            <div class="mrow">
                <span>Network:</span> 
                <span>Base</span>
            </div>
            <div class="mrow">
                <span>Contract:</span>
                <div style="display: flex; align-items: center; gap: 8px; max-width: 70%;">
                    <span id="addr">0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B</span>
                    <button class="copy-btn" id="copy-btn">Copy</button>
                </div>
            </div>
            <div class="mrow">
                <span>Symbol:</span> 
                <span>NXC</span>
            </div>
            <div class="mrow">
                <span>Decimals:</span> 
                <span>18</span>
            </div>
        </div>

        <div class="copyright" style="margin-top: 20px;">
            © 2026 NXC. All rights reserved. | <a href="disclaimer-global.html">Disclaimer</a>
        </div>
    </div>

    <script>
        const tokenAddress = '0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B'; 
        const tokenSymbol = 'NXC';
        const tokenDecimals = 18;
        const tokenImage = window.location.origin + '/XNXC.png';

        // 1. 連接錢包功能
        const connectBtn = document.getElementById('connect-btn');
        let currentAccount = null;

        // 統一更新介面的函數
        function updateUI(address) {
          if (address) {
            const shortAddress = address.substring(0, 6) + "..." + address.substring(address.length - 4);
            connectBtn.innerText = shortAddress;
            connectBtn.style.color = "#00ffcc";
            connectBtn.style.borderColor = "rgba(0, 255, 204, 0.6)";
            localStorage.setItem('isWalletConnected', 'true'); // 記住已連線
          } else {
            connectBtn.innerText = "Connect Wallet";
            connectBtn.style.color = "#00ffcc";
            connectBtn.style.borderColor = "rgba(0, 255, 204, 0.3)";
            localStorage.removeItem('isWalletConnected'); // 清除狀態
          }
        }

        // 初始化檢查（跨頁面同步的核心）
        async function initWallet() {
           if (typeof window.ethereum !== 'undefined') {
            // 如果之前有連線過，自動嘗試讀取帳號
            if (localStorage.getItem('isWalletConnected') === 'true') {
              const accounts = await window.ethereum.request({ method: 'eth_accounts' });
              if (accounts.length > 0) {
                currentAccount = accounts[0];
                updateUI(currentAccount);
              }
            }

            // 監聽 MetaMask 帳號切換
            window.ethereum.on('accountsChanged', (accounts) => {
              if (accounts.length === 0) {
                currentAccount = null;
                updateUI(null);
              } else {
                currentAccount = accounts[0];
                updateUI(currentAccount);
              }
            });
          }
        }

         // 點擊按鈕邏輯
        connectBtn.addEventListener('click', async () => {
          if (typeof window.ethereum !== 'undefined') {
            if (currentAccount) {
              // 如果已經連線，點擊改為斷開
              currentAccount = null;
              updateUI(null);
            } else {
              // 請求連接
               try {
                 const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                 currentAccount = accounts[0];
                 updateUI(currentAccount);
               } catch (error) {
                 console.error("Connection rejected", error);
               }
             }
           } else {
             alert("Please install MetaMask to connect your wallet.");
             window.open('https://metamask.io/download/', '_blank');
           }
         });

        window.addEventListener('DOMContentLoaded', initWallet);
      </script>
</body>
</html>
